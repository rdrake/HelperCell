services:
  jupyterlab:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8888:8888"
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --ServerApp.token=''

  flask-sidecar:
    build:
      context: ./server
      dockerfile: Dockerfile
    network_mode: "service:jupyterlab"
    environment:
      SECRET_KEY: "local-dev-secret"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
